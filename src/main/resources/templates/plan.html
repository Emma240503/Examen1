<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Plan Paciente', '/css/plan.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div class="card">


        <h1 class="farmacia-titulo">
            <span class="label">Farmacia: </span>
            <span class="nombre" th:text="${session.farmaciaNombre}"></span>
        </h1>


        <form th:action="@{/plan}" method="get">
            <div class="buscar-row">
                <label for="cedula">Paciente:</label>
                <input id="cedula" type="text" name="cedula" th:value="${cedula}">
                <button type="submit" class="btn-buscar">Buscar</button>
                <span class="paciente-nombre" th:if="${paciente != null}" th:text="${paciente.nombre}"></span>
                <span class="no-encontrado" th:if="${cedula != null and paciente == null}">Paciente no encontrado</span>
            </div>
        </form>


        <div th:if="${paciente != null and medicamentos != null and medicamentos.size() > 0}">

            <div class="alert-error" th:if="${error != null}" th:text="${error}"></div>

            <form th:action="@{/plan/compra}" method="post">
                <input type="hidden" name="cedula" th:value="${cedula}">
                <div class="med-row">
                    <label>Medicamento:</label>
                    <select name="pmId">
                        <option th:each="pm : ${medicamentos}"
                                th:value="${pm.id}"
                                th:text="${pm.medicamento.nombre + ' (' + pm.medicamento.plan + ' + 1) [' + pm.dosisafavor + ']'}">
                        </option>
                    </select>
                    <span class="cant-label">Cant. Dosis:</span>
                    <input type="number" name="cantidad" min="1" value="1">
                </div>
                <div class="acciones-row">
                    <button type="submit" class="btn-registrar">Registrar</button>
                    <button type="submit" formaction="/plan/regalia" class="btn-entregar">Entregar</button>
                </div>
            </form>
        </div>

        <p class="vacio" th:if="${paciente != null and (medicamentos == null or medicamentos.size() == 0)}">
            Este paciente no tiene medicamentos asociados.
        </p>

    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
