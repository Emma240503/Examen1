<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Plan Paciente - Ingreso', '/css/index.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <aside class="login-panel">
        <div class="login-card">
            <h2>Ingreso</h2>
            <div class="alert-error" th:if="${param.error}">
                Usuario o contraseña incorrectos.
            </div>
            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label for="usuario">Usuario</label>
                    <input id="usuario" type="text" name="usuario" required>
                </div>
                <div class="field">
                    <label for="clave">Contraseña</label>
                    <input id="clave" type="password" name="clave" required>
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>
    </aside>
    <section class="home-content">
        <h1>Plan Paciente</h1>
        <p class="subtitulo">Sistema de gestión de regalías para farmacias.</p>
    </section>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
