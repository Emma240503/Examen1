<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Plan Paciente - Ingreso', '/css/index.css')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>
<nav th:replace="~{fragments :: nav}"></nav>
<main>
    <div class="login-wrapper">
        <div class="login-title-bar">INGRESO</div>
        <div class="login-card">
            <img th:src="@{/images/login.png}" alt="Usuario">
            <div class="alert-error" th:if="${param.error}">Usuario o contraseña incorrectos.</div>
            <form th:action="@{/login}" method="post">
                <div class="field">
                    <label for="usuario">Id</label>
                    <input id="usuario" type="text" name="usuario" required autocomplete="username">
                </div>
                <div class="field">
                    <label for="clave">Clave</label>
                    <input id="clave" type="password" name="clave" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn-login">Ingresar</button>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
