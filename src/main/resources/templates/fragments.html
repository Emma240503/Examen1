<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="head(pageTitle, extraCss)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle} ?: 'Plan Paciente'">Plan Paciente</title>
    <link rel="stylesheet" th:href="@{/css/layout.css}">
    <link rel="stylesheet" th:if="${extraCss != null}" th:href="@{${extraCss}}">
</head>

<header th:fragment="header">
    <img th:src="@{/images/header.jpg}" alt="Patient Care">
</header>

<nav th:fragment="nav">
    <span class="nav-center" th:if="${session.usuarioId != null}" th:text="${session.usuarioId}">Usuario</span>
    <div class="nav-right" th:if="${session.usuarioId != null}">
        <a class="btn-salir" th:href="@{/logout}">LOGOUT</a>
    </div>
</nav>

<footer th:fragment="footer">
    <p>Todos los derechos reservados . 2026 . TotalSoft Inc. info@tsinc.com</p>
</footer>

</html>
